<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gestureControl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Left panel: live preview ── -->
    <aside id="preview-panel">
      <div id="camera-wrap">
        <img id="camera-feed" alt="Camera preview">
        <div id="camera-error" class="hidden">
          <span id="camera-error-text"></span>
        </div>
      </div>

      <div id="camera-selector">
        <select id="camera-select" onchange="onCameraChange(this.value)">
          <option value="">Loading cameras…</option>
        </select>
      </div>

      <div id="hand-states">
        <div class="hand-row" id="hand-right">
          <span class="hand-label">R</span>
          <div class="finger-row">
            <div class="finger-dot" id="r-thumb"  title="Thumb">T</div>
            <div class="finger-dot" id="r-index"  title="Index">I</div>
            <div class="finger-dot" id="r-middle" title="Middle">M</div>
            <div class="finger-dot" id="r-ring"   title="Ring">R</div>
            <div class="finger-dot" id="r-pinky"  title="Pinky">P</div>
          </div>
          <span class="pose-chip" id="r-pose">---</span>
        </div>
        <div class="hand-row" id="hand-left">
          <span class="hand-label">L</span>
          <div class="finger-row">
            <div class="finger-dot" id="l-thumb"  title="Thumb">T</div>
            <div class="finger-dot" id="l-index"  title="Index">I</div>
            <div class="finger-dot" id="l-middle" title="Middle">M</div>
            <div class="finger-dot" id="l-ring"   title="Ring">R</div>
            <div class="finger-dot" id="l-pinky"  title="Pinky">P</div>
          </div>
          <span class="pose-chip" id="l-pose">---</span>
        </div>
      </div>

      <div id="presence-status" class="hidden">
        <div class="presence-indicator">
          <span class="presence-dot" id="presence-dot"></span>
          <span class="presence-label" id="presence-label">Presence</span>
        </div>
        <div class="presence-details" id="presence-details"></div>
      </div>

      <button id="capture-btn" class="btn-secondary" disabled>Capture Pose</button>
      <p id="capture-hint">Show a hand to capture</p>
    </aside>

    <!-- ── Right panel: editor ── -->
    <main id="editor-panel">
      <header id="top-bar">
        <h1>gestureControl</h1>
        <div id="save-controls">
          <span id="dirty-badge" class="hidden">unsaved changes</span>
          <button id="save-btn" class="btn-primary" onclick="saveAll()" disabled>Save</button>
        </div>
      </header>

      <nav id="tabs">
        <button class="tab-btn active" data-tab="poses"    onclick="switchTab('poses')">Poses</button>
        <button class="tab-btn"        data-tab="triggers" onclick="switchTab('triggers')">Triggers</button>
        <button class="tab-btn"        data-tab="actions"  onclick="switchTab('actions')">Actions</button>
        <button class="tab-btn"        data-tab="settings" onclick="switchTab('settings')">Settings</button>
      </nav>

      <!-- Poses tab -->
      <section id="tab-poses" class="tab-pane active">
        <div id="poses-list" class="item-list"></div>
        <button class="btn-add" onclick="newPose()">+ New Pose</button>
      </section>

      <!-- Triggers tab -->
      <section id="tab-triggers" class="tab-pane">
        <div id="triggers-list" class="item-list"></div>
        <button class="btn-add" onclick="newTrigger()">+ New Trigger</button>
      </section>

      <!-- Actions tab -->
      <section id="tab-actions" class="tab-pane">
        <div id="actions-list" class="item-list"></div>
        <button class="btn-add" onclick="newAction()">+ New Action</button>
      </section>

      <!-- Settings tab -->
      <section id="tab-settings" class="tab-pane">
        <div class="settings-form">
          <div class="field">
            <label>Default dwell (ms)
              <span style="font-weight:400;color:var(--text-muted)">— how long a pose must be held before firing</span>
            </label>
            <input type="number" id="setting-dwell-ms" min="0" step="50"
                   oninput="onSettingChange('dwellMs', parseInt(this.value,10))">
          </div>
          <div class="field">
            <label>Spread threshold
              <span style="font-weight:400;color:var(--text-muted)">— normalized gap separating "close" from "apart" (0–1)</span>
            </label>
            <input type="number" id="setting-spread-threshold" min="0" max="1" step="0.05"
                   oninput="onSettingChange('spreadThreshold', parseFloat(this.value))">
          </div>
          <div class="field">
            <label>Grace period (ms)
              <span style="font-weight:400;color:var(--text-muted)">— hold last pose/metric after brief tracking loss (0 = off)</span>
            </label>
            <input type="number" id="setting-grace-period-ms" min="0" step="10" value="200"
                   oninput="onSettingChange('gracePeriodMs', parseInt(this.value,10))">
          </div>
          </div>

          <hr class="divider">

          <div style="font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">
            Presence Detection
          </div>

          <div class="field">
            <label>
              <input type="checkbox" id="setting-presence-enabled" onchange="onPresenceChange()">
              Enabled
              <span style="font-weight:400;color:var(--text-muted)">— blank screen when no motion detected</span>
            </label>
          </div>

          <div class="field">
            <label>
              <input type="checkbox" id="setting-presence-use-motion" onchange="onPresenceChange()">
              Use motion detection
              <span style="font-weight:400;color:var(--text-muted)">— frame diff fallback for background people/motion</span>
            </label>
          </div>

          <div class="field-row">
            <div class="field">
              <label>Idle timeout (s)
                <span style="font-weight:400;color:var(--text-muted)">— blank screen after</span>
              </label>
              <input type="number" id="setting-presence-idle-seconds" min="10" step="10" value="300"
                     oninput="onPresenceChange()">
            </div>
            <div class="field">
              <label>Motion threshold
                <span style="font-weight:400;color:var(--text-muted)">— diff sensitivity (lower = more sensitive)</span>
              </label>
              <input type="number" id="setting-presence-motion-threshold" min="0.5" max="20" step="0.5" value="5.0"
                     oninput="onPresenceChange()">
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label>Check frequency (Hz)
                <span style="font-weight:400;color:var(--text-muted)">— presence checks per second</span>
              </label>
              <input type="number" id="setting-presence-check-hz" min="1" max="10" step="1" value="2"
                     oninput="onPresenceChange()">
            </div>
            <div class="field">
              <label>Check mode
                <span style="font-weight:400;color:var(--text-muted)">— when to use pose detection</span>
              </label>
              <select id="setting-presence-check-mode" onchange="onPresenceChange()">
                <option value="fallback">Fallback (only when motion unclear)</option>
                <option value="always">Always (with every check)</option>
              </select>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label>
                <input type="checkbox" id="setting-presence-pause-hands" onchange="onPresenceChange()">
                Pause hand tracking when absent
                <span style="font-weight:400;color:var(--text-muted)">— release landmarker model on screen blank</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label>
              <input type="checkbox" id="setting-presence-pose-detection" onchange="onPresenceChange()">
              Use pose detection (ONNX model)
              <span style="font-weight:400;color:var(--text-muted)">— additional person detection for higher accuracy</span>
            </label>
          </div>

          <div class="field" style="max-width:160px">
            <label>Pose min confidence
              <span style="font-weight:400;color:var(--text-muted)">— person detection threshold (0.1–1.0)</span>
            </label>
            <input type="number" id="setting-presence-pose-min-conf" min="0.1" max="1.0" step="0.1" value="0.5"
                   oninput="onPresenceChange()">
          </div>
        </div>
      </section>
    </main>

  </div><!-- #app -->

  <!-- ── Edit modal ── -->
  <div id="modal-backdrop" class="hidden" onclick="maybeCloseModal(event)">
    <div id="modal">
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary"   onclick="commitModal()">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
